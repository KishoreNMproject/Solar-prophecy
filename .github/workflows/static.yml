      - name: Prepare Deployment Directory
        run: |
          # Create a master folder to hold both sites
          mkdir _site
          
          # Copy the 'home' folder into _site/home
          cp -r home _site/home
          
          # Copy the 'app' folder into _site/app
          cp -r app _site/app
          
          # Redirect the root URL to the 'home' endpoint
          echo '<meta http-equiv="refresh" content="0; url=./home/" />' > _site/index.html

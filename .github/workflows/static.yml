name: Deploy Multiple Sites to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Prepare Deployment Directory
        run: |
          # Create a master folder to hold both sites
          mkdir _site
          
          # Copy the 'home' folder into _site/home
          cp -r home _site/home
          
          # Copy the 'app' folder into _site/app
          cp -r app _site/app
          
          # Copy verification and SEO files to root
          cp google15b716a04ca25265.html _site/ || true
          cp sitemap.xml _site/ || true
          cp robots.txt _site/ || true
          
          # Redirect the root URL to the 'home' endpoint
          echo '<meta http-equiv="refresh" content="0; url=./home/" />' > _site/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_site'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
